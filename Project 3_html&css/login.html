<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Car Wash - Login</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
    <link rel="stylesheet" href="login.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body>
    <section class="log">
        <div class="login_top">
            <div class="log_bar">
                
                <div class="logo_section">
                    <div class="logo_circle">
                        Logo
                    </div>
                    <span class="logo_text">Car<span class="wash">Wash</span></span>
                </div>

                <div class="back_section">
                    <i class="fas fa-arrow-left"></i>
                    <span class="back_text">Go Back</span>
                </div>

            </div>
        </div>

        <div class="login_middle">
            <div class="login_box">

                <h1>Welcome Back</h1>
                <p class="subheading">
                    Enter your details to log into your account
                </p>

                    <!-- Email -->
                    <div class="input_box">
                        <label>Username or Email</label>
                        <div class="input_wrapper">
                            <div class="input_icon">
                                <i class="fa-regular fa-user"></i>
                            </div>
                            <input type="text" placeholder="Enter your username or email">
                        </div>
                    </div>

                    <!-- Password -->
                    <div class="input_box password_box">
                        <label>Password</label>
                        <div class="input_wrapper">
                            <div class="input_icon">
                                <i class="fa-solid fa-lock"></i>
                            </div>

                            <input type="password" placeholder="Enter your password">

                            <div class="password_eye">
                                <i class="fa-regular fa-eye"></i>
                            </div>
                        </div>
                    </div>

                <!-- Remember / Forgot -->
                <div class="login_options">
                    <div class="remember_me">
                        <input type="checkbox">
                        <span>Remember me</span>
                    </div>

                    <a href="#">Forgot password?</a>
                </div>

                <!-- Login button -->
                <button class="login_btn">Login</button>

                <!-- Divider -->
                <div class="divider">
                    <span></span>
                    <p>OR CONTINUE WITH</p>
                    <span></span>
                </div>

                <!-- Google button -->
                <button class="google_btn">
                    <i class="fa-brands fa-google"></i>
                    <span>Continue with Google</span>
                </button>

                <!-- Signup -->
                <p class="signup_text">
                    Don't have an account? <a href="#">Signup</a>
                </p>

            </div>
        </div>
        <div class="login_footer">
            <p>© 2026 COMPANY NAME. ALL RIGHTS RESERVED</p>
        </div>
    </section>

</body>
</html>
